version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: strix-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - STABLE_DIFFUSION_URL=${STABLE_DIFFUSION_URL:-http://host.docker.internal:7860}
      - COMFYUI_URL=${COMFYUI_URL:-http://host.docker.internal:8188}
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - strix-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: strix-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - server
    networks:
      - strix-net

networks:
  strix-net:
    driver: bridge
